<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/bootstrap.min.css">
    <script src="../JS/bootstrap.min.js"></script>
    <script src="../JS/jquery-3.6.0.js"></script>
    <link rel="stylesheet" href="../CSS/style.css">
    <script src="../JS/bai17.js"></script>
    <title>Document</title>
</head>
<body>
    <div class="head">
        
        <form action="">
            <div class="row form-group">
                <h1 class="col-md-6 text-left">facebook</h1>
                <div class="col-md-2">
                    <label for="">Email hoặc điện thoại</label> 
                    <input type="text" class="form-control">
                    <input type="checkbox" value="dangnhap">Duy trì đăng nhập
                </div>

                <div class="col-md-2">
                    <label for="">Mật khẩu</label>
                    <input type="text" class="form-control"> 
                    <label for="">Quên đăng nhập</label>
                </div>
                
               <input type="button" value="Đăng nhập" class="form-control col-md-1">
            </div>
        </form>
    </div>

    <div class="sec">
        <img src="../img/face.png" alt="">
        <h1 class="text-info">Cảm ơn bạn <br> đã ghé thăm!</h1>
    </div>
   
    <div class="asd">
        <h1>Đăng ký</h1>
        <h4>Miễn phí và sẽ luôn như vậy</h4>
        <form action="">
            <div class="row form-group">
                <input type="text" id="txtHo" placeholder="Họ" class="form-control col-md-4" onblur="ktHo()">
                <input type="text" id="txtTen" placeholder="Tên" class="form-control col-md-4" onblur="ktTen()">
            </div>
            <div class="row form-group">
                <input type="text" id="txtEmail" placeholder="Email đăng nhập" class="form-control col-md-8" onblur="ktEmail()">
            </div>
            <div class="row form-group">
                <input type="text" id="txtHai" placeholder="Nhập lại Email" class="form-control col-md-8" onblur="ktEmailHai()">
            </div>
            <div class="row form-group">
                <input type="text" id="txtPW" placeholder="Mật khẩu" class="form-control col-md-8" onblur="ktMatKhau()">
            </div>
            <div class="row form-group">
                <input type="text" id="txtNamSinh" placeholder="Năm sinh" class="form-control col-md-8" onblur="ktNamSinh()">
            </div>
           
            <div class="row form-group">
               <button class="form-control col-md-3">Đăng ký</button>
            </div>
        </form>
    </div>

    <div class="foot">
       <h4 class="text-left">Chúng tôi mong sớm gặp lại bạn</h4>
    </div>
</body>
</html>
